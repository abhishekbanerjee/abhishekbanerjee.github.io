<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Light Gray */
            color: #334155; /* Slate 700 */
        }
        /* Custom scroll behavior for smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        /* Sections are full-width cards; inner .container handles max-width + centering */
        section {
            padding: 4rem 1rem;
        }
        @media (min-width: 768px) {
            section {
                padding: 6rem 2rem;
            }
        }
        /* Style for active navigation link */
        .nav-active {
            @apply text-blue-500 font-bold;
        }

        /* --- Explicit Styles for Lists and Links within .prose containers --- */
        /* Ensure unordered lists have bullets and proper indentation */
        .prose ul {
            list-style-type: disc; /* Use disc bullets */
            margin-left: 1.5em;   /* Standard indentation */
            padding-left: 0;      /* Reset padding to ensure margin works */
        }
        /* Spacing between list items */
        .prose li {
            margin-bottom: 0.5em;
        }
        /* Ensure links have underlines and a distinct color */
        .prose a {
            color: #3b82f6; /* Tailwind's blue-500 */
            text-decoration: underline; /* Add underline */
        }
        /* Darker blue on hover for links */
        .prose a:hover {
            color: #2563eb; /* Tailwind's blue-600 */
        }
        /* --- End Explicit Styles --- */
    </style>
</head>
<body class="antialiased">

    <!-- Header and Navigation -->
    {% include header.html %}

    <!-- Main content area -->
    {{ content }}

    <!-- Footer -->
    {% include footer.html %}

    <script>
        // Ensure the DOM is fully loaded before running scripts that interact with elements.
        document.addEventListener('DOMContentLoaded', () => {
            // Get the current year for the footer
            const currentYearSpan = document.getElementById('current-year');
            if (currentYearSpan) {
                currentYearSpan.textContent = new Date().getFullYear();
            }

            // Mobile menu toggle
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            if (mobileMenuButton && mobileMenu) {
                mobileMenuButton.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });

                // Close mobile menu when a link is clicked
                mobileMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenu.classList.add('hidden');
                    });
                });
            }

            // Highlight active navigation link on scroll
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('nav a');

            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    const sectionHeight = section.clientHeight;
                    // Add a small offset to ensure the section is clearly in view before activating
                    if (pageYOffset >= sectionTop - sectionHeight / 3 - 50) {
                        current = section.getAttribute('id');
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove('nav-active');
                    // Ensure the link's href matches the current section ID
                    if (link.href.includes(current) && current !== '') {
                        link.classList.add('nav-active');
                    }
                });
            });
        });

        // Assemble email at runtime so it never appears in raw HTML for bots to harvest
        const emailLink = document.getElementById('email-link');
        if (emailLink) {
            const u = 'abhishekbanerjee.iitd+website';
            const d = 'gmail' + '.' + 'com';
            emailLink.href = 'mailto:' + u + '@' + d;
        }
    </script>
</body>
</html>
