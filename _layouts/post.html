---
layout: default
---
<!-- _layouts/post.html -->

<section class="bg-white rounded-lg shadow-md m-4">
    <div class="container mx-auto px-4 py-8">
        <article class="prose max-w-none lg:prose-lg mx-auto">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4">{{ page.title }}</h1>
            <p class="text-gray-600 text-sm mb-6">Published on: {{ page.date | date: "%B %d, %Y" }}</p>

            {{ content }}

            <div class="mt-12 text-center">
                <a href="{{ site.baseurl }}/#blog" class="inline-block bg-blue-500 text-white px-6 py-2 rounded-full text-lg font-semibold hover:bg-blue-600 transition duration-300 shadow-lg">
                    &larr; Back to Blog
                </a>
            </div>
        </article>
    </div>
</section>
