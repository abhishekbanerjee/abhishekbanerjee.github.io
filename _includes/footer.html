<!-- _includes/footer.html -->
<footer class="bg-gray-800 text-white py-8 mt-12 rounded-lg m-4">
    <div class="container mx-auto px-4 text-center">
        <p>&copy; <span id="current-year"></span> {{ site.author }}. All rights reserved.</p>
        <div class="flex justify-center space-x-4 mt-4">
            {% if site.twitter_username %}
            <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" class="text-gray-400 hover:text-white transition duration-300">Twitter</a>
            {% endif %}
            {% if site.instagram_username %}
            <a href="https://instagram.com/{{ site.instagram_username }}" target="_blank" class="text-gray-400 hover:text-white transition duration-300">Instagram</a>
            {% endif %}
            <!-- Add more social links from _config.yml as needed -->
        </div>
    </div>
</footer>
